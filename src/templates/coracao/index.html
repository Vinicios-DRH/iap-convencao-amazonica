<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinâmica do Coração</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --rosa-1: #fff3f6;
            --rosa-2: #ffd7e1;
            --rosa-3: #ff7c99;
            --rosa-4: #e03d66;
            --rosa-5: #aa1c44;
            --texto: #2d1a22;
            --muted: #7c6570;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--texto);
            background:
                radial-gradient(circle at top left, rgba(255, 124, 153, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(224, 61, 102, 0.14), transparent 25%),
                linear-gradient(180deg, #fff8fa 0%, #ffffff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(224, 61, 102, 0.12);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(170, 28, 68, 0.12);
            overflow: hidden;
        }

        .topo {
            padding: 32px 24px 22px;
            text-align: center;
            background: linear-gradient(180deg, #fff5f8 0%, #fff 100%);
            border-bottom: 1px solid rgba(224, 61, 102, 0.10);
        }

        .badge-topo {
            display: inline-block;
            background: #fff;
            color: var(--rosa-4);
            border: 1px solid rgba(224, 61, 102, 0.14);
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: .92rem;
        }

        h1 {
            margin: 18px 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.08;
        }

        .subtitulo {
            color: var(--muted);
            font-size: 1rem;
            margin: 0 auto;
            max-width: 560px;
            line-height: 1.6;
        }

        .conteudo {
            padding: 24px;
        }

        .box {
            background: linear-gradient(180deg, #fff 0%, #fff8fa 100%);
            border: 1px solid rgba(224, 61, 102, 0.12);
            border-radius: 22px;
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .linha {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 12px;
        }

        input[type="text"] {
            width: 100%;
            min-height: 56px;
            border-radius: 16px;
            border: 1px solid rgba(224, 61, 102, 0.20);
            padding: 0 16px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: rgba(224, 61, 102, 0.40);
            box-shadow: 0 0 0 4px rgba(224, 61, 102, 0.10);
        }

        button {
            border: none;
            border-radius: 16px;
            min-height: 56px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s ease;
        }

        .btn-principal {
            background: linear-gradient(135deg, var(--rosa-3), var(--rosa-4));
            color: white;
            box-shadow: 0 14px 28px rgba(224, 61, 102, 0.22);
        }

        .btn-principal:hover {
            transform: translateY(-1px);
        }

        .mensagem {
            min-height: 24px;
            margin-top: 12px;
            font-size: .95rem;
            font-weight: 600;
        }

        .sucesso {
            color: #198754;
        }

        .erro {
            color: #dc3545;
        }

        .info {
            color: #0d6efd;
        }

        .contador {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-weight: 600;
        }

        .admin-box {
            margin-top: 22px;
            padding: 20px;
            border-radius: 22px;
            background: #fff;
            border: 1px solid rgba(224, 61, 102, 0.14);
        }

        .admin-titulo {
            margin: 0 0 12px;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--rosa-5);
        }

        .admin-acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-soft {
            background: #fff;
            color: var(--rosa-5);
            border: 1px solid rgba(224, 61, 102, 0.16);
            padding: 0 18px;
        }

        .btn-danger-soft {
            background: linear-gradient(135deg, #ff8aa4, #e03d66);
            color: white;
            padding: 0 18px;
        }

        .rodape {
            margin-top: 22px;
            text-align: center;
            color: var(--muted);
            font-size: .95rem;
        }

        @media (max-width: 640px) {
            .linha {
                grid-template-columns: 1fr;
            }

            .conteudo,
            .topo {
                padding-left: 18px;
                padding-right: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="topo">
            <div class="badge-topo">❤ O imerecido amor de Deus</div>
            <h1>Dinâmica do coração</h1>
            <p class="subtitulo">
                Digite seu nome para participar da dinâmica final da aula.
            </p>
        </div>

        <div class="conteudo">
            <div class="box">
                <label for="nome">Seu nome</label>

                <div class="linha">
                    <input type="text" id="nome" maxlength="120" placeholder="Digite seu nome aqui" autocomplete="name">
                    <button class="btn-principal" id="btnSalvar">Enviar</button>
                </div>

                <div id="mensagem" class="mensagem"></div>

                <div class="contador">
                    Total de nomes registrados:
                    <strong id="totalNomes">0</strong>
                </div>
            </div>

            {% if is_admin %}
            <div class="admin-box">
                <div class="admin-titulo">Modo professor ativado</div>
                <div class="admin-acoes">
                    <button class="btn-danger-soft" onclick="abrirApresentacao()">Mostrar apresentação</button>
                    <button class="btn-soft" onclick="limparNomes()">Limpar nomes</button>
                    <button class="btn-soft" onclick="sairAdmin()">Sair do modo professor</button>
                </div>
            </div>
            {% endif %}

            <div class="rodape">
                “Eu vos tenho amado, diz o Senhor.” — Malaquias 1:2
            </div>
        </div>
    </div>

    <script>
        async function carregarTotal() {
            try {
                const resp = await fetch("{{ url_for('coracao.listar_nomes') }}");
                const data = await resp.json();
                document.getElementById("totalNomes").textContent = data.total ?? 0;
            } catch (e) {
                document.getElementById("totalNomes").textContent = "—";
            }
        }

        function setMensagem(texto, tipo = "info") {
            const el = document.getElementById("mensagem");
            el.className = "mensagem " + tipo;
            el.textContent = texto;
        }

        async function salvarNome() {
            const input = document.getElementById("nome");
            const botao = document.getElementById("btnSalvar");
            const nome = input.value.trim();

            setMensagem("");

            if (!nome) {
                setMensagem("Digite seu nome.", "erro");
                input.focus();
                return;
            }

            botao.disabled = true;
            botao.textContent = "Enviando...";

            try {
                const resp = await fetch("{{ url_for('coracao.adicionar_nome') }}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ nome })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    setMensagem(data.mensagem || "Erro ao enviar.", "erro");
                    return;
                }

                if (data.admin) {
                    setMensagem("Modo professor ativado. Recarregando...", "info");
                    input.value = "";
                    setTimeout(() => {
                        window.location.reload();
                    }, 800);
                    return;
                }

                setMensagem(data.mensagem || "Nome registrado com sucesso.", "sucesso");
                input.value = "";
                input.focus();
                await carregarTotal();
            } catch (e) {
                setMensagem("Erro de conexão ao enviar o nome.", "erro");
            } finally {
                botao.disabled = false;
                botao.textContent = "Enviar";
            }
        }

        function abrirApresentacao() {
            window.open("{{ url_for('coracao.apresentacao') }}", "_blank");
        }

        async function limparNomes() {
            const ok = confirm("Tem certeza que deseja apagar todos os nomes?");
            if (!ok) return;

            try {
                const resp = await fetch("{{ url_for('coracao.limpar') }}", {
                    method: "POST"
                });

                const data = await resp.json();

                if (!resp.ok) {
                    alert(data.mensagem || "Erro ao limpar nomes.");
                    return;
                }

                alert(data.mensagem || "Nomes apagados com sucesso.");
                await carregarTotal();
            } catch (e) {
                alert("Erro de conexão ao limpar nomes.");
            }
        }

        async function sairAdmin() {
            try {
                await fetch("{{ url_for('coracao.sair_admin') }}", {
                    method: "POST"
                });
                window.location.reload();
            } catch (e) {
                alert("Não foi possível sair do modo professor.");
            }
        }

        document.getElementById("btnSalvar").addEventListener("click", salvarNome);

        document.getElementById("nome").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                salvarNome();
            }
        });

        carregarTotal();
        setInterval(carregarTotal, 8000);
    </script>
</body>

</html>
